{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="card" style="max-width:640px;margin:0 auto">
  <h2>Create account</h2>
  <form method="POST" action="{{ url_for('register') }}" enctype="multipart/form-data">
    <div class="form-group"><label>Name</label><input type="text" name="name" required></div>
    <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
    <div class="form-group"><label>Phone</label><input type="text" name="phone"></div>
    <div class="form-group"><label>Age</label><input type="number" name="age" min="0" step="1"></div>
    <div class="form-group">
      <label>Gender</label>
      <select name="gender">
        <option value="">-- Select Gender --</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-group"><label>Height (cm)</label><input type="number" name="height" min="0" step="0.1"></div>
    <div class="form-group"><label>Weight (kg)</label><input type="number" name="weight" min="0" step="0.1"></div>
    <div class="form-group"><label>Password</label><input type="password" name="password" required></div>

    <div class="form-group">
      <label>Upload blood report (PDF / PNG / JPG)</label>
      <input type="file" name="report" accept=".pdf,.png,.jpg,.jpeg">
    </div>

    <button class="btn" type="submit">Register</button>
  </form>
</div>
{% endblock %}
