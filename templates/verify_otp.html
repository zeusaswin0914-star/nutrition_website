{% extends "base.html" %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;margin:0 auto">
    <h2>Verify OTP</h2>
    <p>We have sent a 6-digit OTP to <strong>{{ email }}</strong>.</p>
    <p class="muted">Check your terminal logs if testing locally.</p>

    <form method="POST" action="{{ url_for('verify_otp') }}">
        <div class="form-group">
            <label>Enter 6-digit OTP</label>
            <input type="text" name="otp" placeholder="123456" pattern="\d{6}" maxlength="6" required
                style="font-size:1.5rem; letter-spacing:8px; text-align:center;">
        </div>
        <button class="btn" type="submit">Verify</button>
    </form>
</div>
{% endblock %}
