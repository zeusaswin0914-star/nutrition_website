{% extends "base.html" %}
{% block title %}Upload Blood Report{% endblock %}
{% block content %}
<div class="card">
  <h2>Upload Blood Report</h2>
  <p>Upload PDF/PNG/JPG of blood report or enter values manually.</p>

  <form method="POST" action="{{ url_for('upload_report') }}" enctype="multipart/form-data">
    <div class="upload-area card" style="text-align:center;">
      <input id="fileInput" type="file" name="report_file" accept=".pdf,.png,.jpg,.jpeg">
      <p id="fileName">No file selected</p>
      <button id="uploadBtn" type="button" class="upload-btn">Choose file</button>
      <div style="margin-top:10px">or</div>
    </div>

    <hr style="margin:14px 0;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
      <div>
        <label>Age</label><input type="number" name="age" step="1">
      </div>
      <div><label>Height (cm)</label><input type="number" name="height" step="1"></div>
      <div><label>Weight (kg)</label><input type="number" name="weight" step="1"></div>
      <div>
        <label>Gender</label>
        <select name="gender">
          <option value="">-- Select --</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px">
      <div><label>Hemoglobin (g/dL)</label><input type="number" step="0.1" name="hgb"></div>
      <div><label>Fasting glucose (mg/dL)</label><input type="number" step="0.1" name="glucose"></div>
      <div><label>Total cholesterol (mg/dL)</label><input type="number" step="0.1" name="cholesterol"></div>
    </div>

    <div style="margin-top:14px">
      <button class="btn" type="submit">Generate Report</button>
    </div>
  </form>
</div>
<script>
// file chooser UI
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
const uploadBtn = document.getElementById('uploadBtn');
uploadBtn.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', ()=>{
  const f = fileInput.files[0];
  fileName.textContent = f ? f.name : 'No file selected';
});

// Ajax submit: keep compatibility with normal POST by redirecting if server redirects
const form = document.querySelector('form');
form.addEventListener('submit', async (e)=>{
  // prefer normal submit if JavaScript disabled; here we intercept
  e.preventDefault();
  const url = form.action;
  const fd = new FormData(form);

  try{
    const resp = await fetch(url, { method: 'POST', body: fd, redirect: 'follow' });
    // If server redirected to a new URL (e.g., /report/view), navigate there
    if (resp.url && resp.url !== window.location.href){
      window.location.href = resp.url;
      return;
    }
    // fallback: reload page
    window.location.reload();
  }catch(err){
    console.error('Upload failed', err);
    alert('Upload failed: '+err.message);
  }
});
</script>
{% endblock %}
